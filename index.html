<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flip 7 Scorekeeper</title>
<style>
  :root {
    --bg: #1a1040;
    --card: #2a1b5e;
    --accent: #ff5e7e;
    --gold: #ffd23f;
    --green: #3ddc84;
    --blue: #4cc9f0;
    --purple: #b388ff;
    --text: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #1a1040 0%, #2d1457 55%, #43186b 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 {
    text-align: center;
    font-size: clamp(28px, 6vw, 44px);
    margin-bottom: 4px;
    background: linear-gradient(90deg, var(--gold), var(--accent), var(--blue));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .subtitle { text-align: center; color: var(--purple); font-size: 16px; margin-bottom: 20px; font-weight: 600; }

  /* ---------- Setup screen ---------- */
  #setup { max-width: 520px; margin: 0 auto; }
  .name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .name-num {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 20px; flex-shrink: 0;
    color: #1a1040;
  }
  .name-row input {
    flex: 1;
    font-size: 22px;
    padding: 14px 16px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    color: var(--text);
    outline: none;
    min-width: 0;
  }
  .name-row input:focus { border-color: var(--gold); background: rgba(255,255,255,0.16); }
  .name-row input::placeholder { color: rgba(255,255,255,0.4); }
  .big-btn {
    display: block;
    width: 100%;
    padding: 20px;
    font-size: 24px;
    font-weight: 800;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    margin-top: 16px;
    color: #1a1040;
    background: linear-gradient(90deg, var(--gold), #ffb53f);
    box-shadow: 0 6px 0 rgba(0,0,0,0.3);
    transition: transform 0.08s;
  }
  .big-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

  /* ---------- Game screen ---------- */
  #game { display: none; max-width: 760px; margin: 0 auto; }
  .round-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
  }
  .round-label {
    font-size: 22px; font-weight: 800; color: var(--gold);
    background: rgba(255,210,63,0.12);
    padding: 8px 18px; border-radius: 999px;
    border: 2px solid rgba(255,210,63,0.4);
  }
  .ctrl-btns { display: flex; gap: 8px; }
  .ctrl-btn {
    padding: 12px 18px; font-size: 17px; font-weight: 700;
    border: none; border-radius: 12px; cursor: pointer; color: #fff;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    transition: transform 0.08s;
  }
  .ctrl-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
  .ctrl-btn:disabled { opacity: 0.35; cursor: default; }
  #undoBtn { background: linear-gradient(90deg, #ff9a3f, #ff5e7e); }
  #newGameBtn { background: linear-gradient(90deg, #4cc9f0, #b388ff); }

  .players { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  @media (max-width: 700px) { .players { grid-template-columns: 1fr; } }

  .player-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform 0.08s, border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .player-card:active { transform: scale(0.97); }
  .player-card.leader {
    border-color: var(--gold);
    background: rgba(255,210,63,0.14);
    box-shadow: 0 0 18px rgba(255,210,63,0.35);
  }
  .player-card.scored-this-round { opacity: 0.55; }
  .pc-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .pc-dot {
    width: 50px; height: 50px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 24px; color: #1a1040; flex-shrink: 0;
  }
  .pc-info { min-width: 0; }
  .pc-name {
    font-size: clamp(20px, 4.5vw, 26px); font-weight: 800;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pc-last { font-size: 14px; color: rgba(255,255,255,0.6); font-weight: 600; margin-top: 2px; }
  .pc-total { font-size: clamp(30px, 7vw, 42px); font-weight: 900; flex-shrink: 0; }
  .leader .pc-total { color: var(--gold); }
  .crown { font-size: 22px; margin-left: 6px; }

  /* ---------- Score modal ---------- */
  #overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,5,30,0.85);
    z-index: 50;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  #overlay.show { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    width: 100%;
    max-width: 420px;
    border: 3px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-title { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .modal-sub { text-align: center; color: var(--purple); font-weight: 600; margin-bottom: 14px; }
  .score-display {
    text-align: center;
    font-size: 56px; font-weight: 900;
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    padding: 8px;
    margin-bottom: 14px;
    min-height: 84px;
    color: var(--gold);
    letter-spacing: 2px;
  }
  .pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pad button {
    font-size: 30px; font-weight: 800;
    padding: 18px 0;
    border: none; border-radius: 14px;
    background: rgba(255,255,255,0.12);
    color: #fff; cursor: pointer;
    transition: transform 0.06s, background 0.15s;
  }
  .pad button:active { transform: scale(0.93); background: rgba(255,255,255,0.25); }
  .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .bust-btn, .ok-btn, .cancel-btn {
    font-size: 22px; font-weight: 800;
    padding: 16px 0;
    border: none; border-radius: 14px;
    cursor: pointer; color: #fff;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    transition: transform 0.08s;
  }
  .bust-btn:active, .ok-btn:active, .cancel-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
  .bust-btn { background: linear-gradient(90deg, #ff5e7e, #e63956); grid-column: 1 / -1; }
  .ok-btn { background: linear-gradient(90deg, #3ddc84, #1fa860); color: #0b3320; }
  .cancel-btn { background: rgba(255,255,255,0.15); }

  /* ---------- Win banner ---------- */
  #winBanner {
    display: none;
    position: fixed; inset: 0;
    z-index: 100;
    background: rgba(10,5,30,0.92);
    align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 24px;
  }
  #winBanner.show { display: flex; }
  .win-trophy { font-size: 90px; animation: bounce 1s infinite alternate ease-in-out; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-18px); } }
  .win-name {
    font-size: clamp(40px, 10vw, 72px); font-weight: 900;
    background: linear-gradient(90deg, var(--gold), var(--accent), var(--blue), var(--green));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 12px 0 4px;
  }
  .win-msg { font-size: 26px; font-weight: 700; color: var(--gold); margin-bottom: 28px; }
  .win-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .win-btns button {
    font-size: 22px; font-weight: 800;
    padding: 18px 30px;
    border: none; border-radius: 16px;
    cursor: pointer; color: #1a1040;
    box-shadow: 0 5px 0 rgba(0,0,0,0.35);
  }
  .win-btns .again { background: linear-gradient(90deg, var(--gold), #ffb53f); }
  .win-btns .keep { background: rgba(255,255,255,0.85); }
  .confetti {
    position: absolute; top: -20px;
    font-size: 28px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0.7; }
  }
</style>
</head>
<body>

<h1>FLIP 7</h1>
<div class="subtitle">SCOREKEEPER · FIRST TO 200 WINS</div>

<!-- Setup -->
<div id="setup">
  <div id="nameRows"></div>
  <button class="big-btn" onclick="startGame()">▶ START GAME</button>
</div>

<!-- Game -->
<div id="game">
  <div class="round-bar">
    <div class="round-label">ROUND <span id="roundNum">1</span></div>
    <div class="ctrl-btns">
      <button class="ctrl-btn" id="undoBtn" onclick="undo()" disabled>↩ UNDO</button>
      <button class="ctrl-btn" id="newGameBtn" onclick="confirmNewGame()">✦ NEW GAME</button>
    </div>
  </div>
  <div class="players" id="playerList"></div>
</div>

<!-- Score entry modal -->
<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalName"></div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="score-display" id="scoreDisplay">&nbsp;</div>
    <div class="pad">
      <button onclick="padDigit(1)">1</button><button onclick="padDigit(2)">2</button><button onclick="padDigit(3)">3</button>
      <button onclick="padDigit(4)">4</button><button onclick="padDigit(5)">5</button><button onclick="padDigit(6)">6</button>
      <button onclick="padDigit(7)">7</button><button onclick="padDigit(8)">8</button><button onclick="padDigit(9)">9</button>
      <button onclick="padClear()">C</button><button onclick="padDigit(0)">0</button><button onclick="padBack()">⌫</button>
    </div>
    <button class="bust-btn" style="margin-top:12px;width:100%" onclick="submitScore(0)">💥 BUSTED — 0 POINTS</button>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">CANCEL</button>
      <button class="ok-btn" onclick="submitEntered()">✓ OK</button>
    </div>
  </div>
</div>

<!-- Win banner -->
<div id="winBanner">
  <div class="win-trophy">🏆</div>
  <div class="win-name" id="winName"></div>
  <div class="win-msg" id="winMsg"></div>
  <div class="win-btns">
    <button class="again" onclick="newGame()">🎉 NEW GAME</button>
    <button class="keep" onclick="hideWin()">KEEP SCORING</button>
  </div>
</div>

<script>
const COLORS = ['#ffd23f','#ff5e7e','#4cc9f0','#3ddc84','#b388ff','#ff9a3f','#f72585','#80ffdb'];
const TARGET = 200;

let players = [];
let history = [];
let currentPlayer = null;
let entered = '';
let winShown = false;

const nameRows = document.getElementById('nameRows');
for (let i = 0; i < 8; i++) {
  nameRows.insertAdjacentHTML('beforeend',
    `<div class="name-row">
       <div class="name-num" style="background:${COLORS[i]}">${i+1}</div>
       <input type="text" maxlength="14" placeholder="Player ${i+1}${i<2?'':' (optional)'}" id="name${i}" autocomplete="off">
     </div>`);
}

function startGame() {
  players = [];
  for (let i = 0; i < 8; i++) {
    const v = document.getElementById('name' + i).value.trim();
    if (v) players.push({ name: v, color: COLORS[i], scores: [] });
  }
  if (players.length < 1) { alert('Enter at least one player name!'); return; }
  history = [];
  winShown = false;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  render();
}

const total = p => p.scores.reduce((a, b) => a + b, 0);
const currentRound = () => Math.min(...players.map(p => p.scores.length)) + 1;
const inCurrentRound = p => p.scores.length >= currentRound();

function render() {
  document.getElementById('roundNum').textContent = currentRound();
  document.getElementById('undoBtn').disabled = history.length === 0;
  const totals = players.map(total);
  const max = Math.max(...totals);
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const t = totals[i];
    const isLeader = t === max && t > 0;
    const done = inCurrentRound(p);
    const last = p.scores.length
      ? (p.scores[p.scores.length-1] === 0 ? 'Last: BUST 💥' : 'Last: +' + p.scores[p.scores.length-1])
      : 'Tap to score';
    list.insertAdjacentHTML('beforeend',
      `<div class="player-card ${isLeader?'leader':''} ${done?'scored-this-round':''}" onclick="openModal(${i})">
         <div class="pc-left">
           <div class="pc-dot" style="background:${p.color}">${p.name[0].toUpperCase()}</div>
           <div class="pc-info">
             <div class="pc-name">${esc(p.name)}${isLeader?'<span class="crown">👑</span>':''}</div>
             <div class="pc-last">${last}</div>
           </div>
         </div>
         <div class="pc-total">${t}</div>
       </div>`);
  });
}

function esc(s){ const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function openModal(i) {
  currentPlayer = i;
  entered = '';
  const p = players[i];
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalSub').textContent =
    `Round ${p.scores.length + 1} · Current total: ${total(p)}`;
  updateDisplay();
  document.getElementById('overlay').classList.add('show');
}
function closeModal() { document.getElementById('overlay').classList.remove('show'); currentPlayer = null; }
function padDigit(d) { if (entered.length < 3) { entered += d; updateDisplay(); } }
function padBack() { entered = entered.slice(0, -1); updateDisplay(); }
function padClear() { entered = ''; updateDisplay(); }
function updateDisplay() {
  document.getElementById('scoreDisplay').innerHTML = entered === '' ? '&nbsp;' : entered;
}
function submitEntered() {
  if (entered === '') { closeModal(); return; }
  submitScore(parseInt(entered, 10));
}
function submitScore(val) {
  if (currentPlayer === null) return;
  const scoredIdx = currentPlayer;
  players[scoredIdx].scores.push(val);
  history.push(scoredIdx);
  render();
  checkWin();

  if (winShown) { closeModal(); return; }

  const nextIdx = findNextPlayer(scoredIdx);
  if (nextIdx !== null) {
    currentPlayer = nextIdx;
    entered = '';
    const p = players[nextIdx];
    document.getElementById('modalName').textContent = p.name;
    document.getElementById('modalSub').textContent =
      `Round ${p.scores.length + 1} · Current total: ${total(p)}`;
    updateDisplay();
  } else {
    closeModal();
  }
}

function findNextPlayer(fromIdx) {
  const n = players.length;
  for (let offset = 1; offset < n; offset++) {
    const idx = (fromIdx + offset) % n;
    if (!inCurrentRound(players[idx])) return idx;
  }
  return null;
}

function undo() {
  if (!history.length) return;
  const i = history.pop();
  players[i].scores.pop();
  winShown = false;
  hideWin();
  render();
}

function checkWin() {
  if (winShown) return;
  let best = null;
  players.forEach(p => {
    const t = total(p);
    if (t >= TARGET && (!best || t > total(best))) best = p;
  });
  if (best) {
    winShown = true;
    document.getElementById('winName').textContent = best.name + ' WINS!';
    document.getElementById('winMsg').textContent = total(best) + ' points 🔥';
    document.getElementById('winBanner').classList.add('show');
    confetti();
  }
}
function hideWin() { document.getElementById('winBanner').classList.remove('show'); }
function confetti() {
  const banner = document.getElementById('winBanner');
  const emojis = ['🎉','✨','🎊','⭐','💛','🃏'];
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'confetti';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = 2 + Math.random() * 3 + 's';
    s.style.animationDelay = Math.random() * 1.5 + 's';
    banner.appendChild(s);
    setTimeout(() => s.remove(), 6000);
  }
}

function confirmNewGame() {
  if (history.length === 0 || confirm('Start a new game? Current scores will be lost.')) newGame();
}
function newGame() {
  hideWin();
  document.getElementById('game').style.display = 'none';
  document.getElementById('setup').style.display = 'block';
}
</script>
</body>
</html>
